<div class="imagenes">
    <!-- Primera imagen -->
    <img class="imagen" src="https://picsum.photos/id/1015/800/400" style="display: block;">

    <!-- Segunda imagen -->
    <img class="imagen" src="https://picsum.photos/id/1016/800/400" style="display: none;">

    <!-- Tercera imagen -->
    <img class="imagen" src="https://picsum.photos/id/1018/800/400" style="display: none;">
</div>

<div class="botones">
    <button id="btn1">1</button>
    <button id="btn2">2</button>
    <button id="btn3">3</button>
</div>

<script>
    const carrusel = document.getElementsByClassName("imagen");
    const boton1 = document.getElementById("btn1");
    const boton2 = document.getElementById("btn2");
    const boton3 = document.getElementById("btn3");

    boton1.addEventListener('click', function () {
        fboton(0);
    });

    boton2.addEventListener('click', function () {
        fboton(1);
    });

    boton3.addEventListener('click', function () {
        fboton(2);
    });

    function fboton(index) {
        for (let i = 0; i < carrusel.length; i++) {
            carrusel[i].style.display = "none";
        }

        carrusel[index].style.display = "block";
    }
</script>
