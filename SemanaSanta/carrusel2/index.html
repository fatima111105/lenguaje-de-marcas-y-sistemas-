<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div><img src="/SemanaSanta/img/flor1.jpg" class="imagen" style="display:block;"></div>
    <div><img src="/SemanaSanta/img/flor2.jpg" class="imagen" style="display:none;" width="100px" height="300px"></div>
    <div><img src="/SemanaSanta/img/flor4.jpg" class="imagen" style="display:none;"></div>

    <button id="b1">1</button>
    <button id="b2">2</button>
    <button id="b3">3</button>
    <script>
        let carrusel = document.getElementsByClassName("imagen");
        let b1 = document.getElementById("b1");
        let b2 = document.getElementById("b2");
        let b3 = document.getElementById("b3");
        b1.addEventListener("click", function () {
            for (let i = 0; i < carrusel.length; i++) {
                carrusel[i].style.display = "none"
            }
            carrusel[0].style.display = "block"

        })
        b2.addEventListener("click", function () {
            for (let i = 0; i < carrusel.length; i++) {
                carrusel[i].style.display = "none"
            }
            carrusel[1].style.display = "block"
        })
        b3.addEventListener("click", function () {
            for (let i = 0; i < carrusel.length; i++) {
                carrusel[i].style.display = "none"
            }
            carrusel[2].style.display = "block"
        })




    </script>
</body>

</html>
