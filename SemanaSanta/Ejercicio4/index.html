<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <h1>lista </h1>
    <ul id="lista"></ul>
    <button id="agregar">Agregar </button>

    </ul>
    <script>

        let boton = document.getElementById("agregar");
        let lista = document.getElementById("lista")
        boton.addEventListener("click", function () {
            let il=document.createElement("li");
            let comentario=document.createTextNode("Nuevo mensaje");
            il.appendChild(comentario);//dentro del elelmento li se agrega el texto del comentario
            lista.appendChild(il);//dentro de la lista se agrega el elemento li

        });





    </script>

</body>

</html>
