<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #caja{
            width: 200px;
            height: 200px;
            background-color: rgb(241, 71, 176);
            text-align: center;
            font-size: 20px;
            align-items: center;
        }
        p{
            margin: 0;
            padding-top: 80px;
            color: black;
        }
    </style>
</head>
<body>
    <div id="caja">
        <p id="textoCaja">Caja</p>
    </div>
    <button id="botonColor">Cambiar color</button>
    <script>
        const caja=document.getElementById("caja")//Obtenemos el elemento del div por su ID
        const textoCaja=document.getElementById("textoCaja")//Obtenemos el elemento del párrafo por su ID
        const btnColor=document.getElementById("botonColor")  //Obtenemos el elemento del botón por su ID
        btnColor.addEventListener("click",function(){//Agregamos un evento de clic al botón
            caja.style.backgroundColor= "lightblue"//Cuando se hace clic en el botón, cambiamos el color de fondo del div a un nuevo color
            textoCaja.style.color="white"//También cambiamos el color del texto dentro del div a blanco
            
        })  


    </script>
</body>
</html>
