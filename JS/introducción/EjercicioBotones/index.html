<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        


    </style>
</head>
<body>
    <h1>Paisajes</h1>
    <button id="boton1">Imagen 1</button>
    <button id="boton2">Imagen 2</button>
    <button id="boton3">Imagen 3</button>
    <div class="contenedor">
        <img class="imagen" src="/JS/introducción/EjercicioBotones/imagenes/img1.webp" >
        <img class="imagen" src="/JS/introducción/EjercicioBotones/imagenes/img2.webp" >
        <img class="imagen" src="/JS/introducción/EjercicioBotones/imagenes/img3.webp" >
    </div>

  <script>
        const carrusel=document.getElementsByClassName("imagen");
        const boton1=document.getElementById("boton1");
        const boton2=document.getElementById("boton2");
        const boton3=document.getElementById("boton3");
        boton1.addEventListener("click",function(){fboton(0)} );
        boton2.addEventListener("click", function(){fboton(1)} );
        boton3.addEventListener("click", function(){fboton(2)} );
        function fboton(index){
          for (let i = 0; i < carrusel.length; i++) {
            carrusel[i].style.display = "none";
          }


          carrusel[index].style.display = "block";
        }
        
    </script>
</body>
</html>
