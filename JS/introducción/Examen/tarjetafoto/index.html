<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Tarjetas de Artículos</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        form {
            background: white;
            padding: 15px;
            border-radius: 10px;
            max-width: 400px;
            margin: 0 auto 30px auto;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        input,
        button {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            background-color: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .contenedor-tarjetas {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .tarjeta {
            background: white;
            width: 200px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            transition: transform 0.2s;
        }

        .tarjeta:hover {
            transform: scale(1.05);
        }

        .tarjeta img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .tarjeta h3 {
            margin: 10px 0 5px 0;
        }

        .tarjeta p {
            color: green;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .eliminar {
            background-color: crimson;
            color: white;
            border: none;
            margin: 10px;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            width: auto;
        }

        .eliminar:hover {
            background-color: darkred;
        }
    </style>

</head>

<body>

    <h1>Crear artículo</h1>

    <form id="formulario">
        <input type="text" id="nombre" placeholder="Nombre del artículo" required>
        <input type="number" id="precio" placeholder="Precio (€)" required>
        <input type="text" id="imagen" placeholder="Ruta o URL de la imagen" required>
        <button id="submit">Crear tarjeta</button>
    </form>

    <div class="contenedor-tarjetas" id="contenedor"></div>

    <script>
        let contenedor = document.getElementById("contenedor");
        let nombre = document.getElementById("nombre");
        let precio = document.getElementById("precio");
        let imagen = document.getElementById("imagen");
        let submit = document.getElementById("submit");

        submit.addEventListener("click", function () {

            if (nombre.value === "" || precio.value === "" || imagen.value === "") {
                alert("No es posible dejar un campo o varios vacíos");
            } else {

                contenedor.style.display = "block";

                //creo los elementos que van a estar dentro de la tarjeta
                let nombreArt = document.createElement("h3");
                let imagenArt = document.createElement("img");
                let precioArt = document.createElement("p");
                let btn = document.createElement("button");
                let tarjeta = document.createElement("div");

                //aqui con el setAttribute le pongo el src de la imagen
                imagenArt.setAttribute("src", imagen.value);

                //añado la tarjeta al contenedor
                contenedor.appendChild(tarjeta);

                //css de la tarjeta
                tarjeta.classList.add("tarjeta");

                //pongo el valor de cada variable
                nombreArt.textContent = nombre.value;
                //la imagen no necesita textContent
                //pongo el valor de cada variable
                precioArt.textContent = precio.value;

                //todos los elementos van dentro de tarjeta
                tarjeta.appendChild(imagenArt);
                tarjeta.appendChild(nombreArt);
                tarjeta.appendChild(precioArt);
                tarjeta.appendChild(btn);

                btn.textContent = "Eliminar";
                btn.classList.add("eliminar");
                btn.classList.add("eliminar:hover");

                //borro la tarjeta
                btn.addEventListener("click", function () {
                    tarjeta.remove();
                });

                //limpio los inputs
                nombre.value = "";
                precio.value = "";
                imagen.value = "";
            }

        });

        //evito que se recargue la pagina al dar a submit
        //e.preventDefault();

    </script>

</body>

</html>
