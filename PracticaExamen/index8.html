<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        <!-- estado inicial del css-->
        #contenedor {
        display:
        none;
        }
    <!-- estado cuando actua  del css-->
    #contenedor.clase{
    display: block;
    }
    </style>
</head>

<body>

    <button id="boton">abrir/cerrar</button>
    <div id="contenedor"> se ve </div>
    
    <script>
        let btn = document.getElementById("boton");
        let contenedor = document.getElementById("contenedor")
        btn.addEventListener("click", function () {
            //alternativa 1 con clas list se le añade la clase css al contenedor
            contenedor.classList.toggle("clase");
        }

        )

    </script>





</body>

</html>
